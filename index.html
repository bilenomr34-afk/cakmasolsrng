<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>RNG FIXED</title>

<style>
body{
    margin:0;
    background:#0b0b0f;
    color:white;
    font-family:Arial;
    text-align:center;
}

.card{
    width:420px;
    margin:20px auto;
    padding:20px;
    background:rgba(255,255,255,0.05);
    border-radius:15px;
}

button{
    padding:10px 15px;
    margin:5px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    color:white;
}

.rollBtn{ background:#6a00ff; }
.autoBtn{ background:#ff006a; }

#result{
    font-size:30px;
    margin:10px;
}

.common{color:#aaa;}
.rare{color:#00c3ff;}
.epic{color:#b84dff;}
.legendary{color:#ffd700;}
.godly{color:#ff0033;}
.samet{color:#00ff99;}

#bar{
    width:100%;
    height:10px;
    background:#222;
}

#fill{
    height:100%;
    width:0%;
    background:white;
}

#flash{
    position:fixed;
    inset:0;
    background:white;
    opacity:0;
    pointer-events:none;
}

#star{
    position:fixed;
    top:50%;
    left:50%;
    width:70px;
    height:70px;
    background:conic-gradient(red,yellow,green,cyan,blue,red);
    clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
    transform:translate(-50%,-50%) scale(0.2);
    opacity:0;
}
</style>
</head>

<body>

<h1>RNG SYSTEM</h1>

<div class="card">

<button class="rollBtn" onclick="roll()">ROLL</button>
<button class="autoBtn" onclick="toggleAuto()">AUTO</button>

<div id="result">?</div>

<div id="bar"><div id="fill"></div></div>

<div id="inv"></div>

</div>

<div id="flash"></div>
<div id="star"></div>

<script>

const items=[
{name:"Cihan",chance:60,class:"common"},
{name:"Ferit",chance:25,class:"rare"},
{name:"Pedo",chance:10,class:"epic"},
{name:"Lezbi",chance:4,class:"legendary"},
{name:"Deria",chance:1,class:"godly"},
{name:"Samet",chance:0.0001,class:"samet"}
];

let inv=[];
let auto=false;
let loop;
let luck=0;
let lock=false;

/* INVENTORY */
function updateInv(){
document.getElementById("inv").innerHTML=inv.join("<br>");
}

/* EFFECT */
function effect(item){

let star=document.getElementById("star");
let flash=document.getElementById("flash");

let scale=0.2;
let rot=0;

star.style.opacity=1;

let anim=setInterval(()=>{

scale+=0.04;
rot+=8;

star.style.transform=`translate(-50%,-50%) scale(${scale}) rotate(${rot}deg)`;

document.body.style.transform="translate(2px,2px)";

if(scale>2.5){

clearInterval(anim);

flash.style.opacity=1;

setTimeout(()=>{

flash.style.opacity=0;
star.style.opacity=0;
document.body.style.transform="none";

document.getElementById("result").innerText=item.name;
document.getElementById("result").className=item.class;

},200);

}

},30);
}

/* BAR */
function bar(cb){

if(lock) return;
lock=true;

let f=document.getElementById("fill");
let w=0;

let t=setInterval(()=>{

w+=5;
f.style.width=w+"%";

if(w>=100){
clearInterval(t);
f.style.width="0%";
lock=false;
cb();
}

},20);
}

/* ROLL */
function roll(){

if(lock) return;

let r=Math.random()*100;
let sum=0;

for(let i of items){

sum+=i.chance;

if(r<=sum){

if(i.name==="Samet"){
document.getElementById("result").innerText="SAMET";
}else{
effect(i);
}

inv.push(i.name);
updateInv();
return;
}

}

}

/* AUTO */
function toggleAuto(){

auto=!auto;

if(auto){

loop=setInterval(()=>{

bar(()=>roll());

},600);

}else{
clearInterval(loop);
document.getElementById("fill").style.width="0%";
}

}

</script>

</body>
</html>
