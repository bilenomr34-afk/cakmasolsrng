
<!DOCTYPE html>
<html lang="tr"><head><meta charset="UTF-8"><title>Wordle TR</title>
<style>
body{font-family:Arial;background:#121213;color:#fff;display:flex;flex-direction:column;align-items:center}
#grid{display:grid;grid-template-columns:repeat(5,60px);gap:6px;margin:20px}
.cell{width:60px;height:60px;border:2px solid #3a3a3c;display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:bold}
button{margin:8px;padding:10px 18px}
</style></head><body>
<h1>Wordle TR</h1>
<p>Bu iskelet sürümdür. Kelime listesi çok büyük olduğu için bu sohbete sığmıyor. KELIMELER dizisine 5 harfli kelimeleri ekleyin.</p>
<div id="grid"></div><button onclick="newGame()">Yeni Oyun</button>
<script>
const KELIMELER=["abide","abone","acele","acemi","adres","afyon"];
let answer="";
const grid=document.getElementById("grid");
for(let i=0;i<30;i++){let d=document.createElement("div");d.className="cell";grid.appendChild(d);}
function newGame(){answer=KELIMELER[Math.floor(Math.random()*KELIMELER.length)];console.log(answer);alert("Yeni oyun başladı!");}
newGame();
</script></body></html>
