<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>RNG Roll</title>

<style>
body{
    background:#111;
    color:white;
    font-family:Arial;
    text-align:center;
    margin-top:100px;
}

button{
    padding:15px 30px;
    font-size:22px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    margin:10px;
    color:white;
}

.rollBtn{ background:#6a00ff; }
.autoBtn{ background:#ff006a; }

#result{
    margin-top:40px;
    font-size:45px;
    font-weight:bold;
}

.common{ color:gray; }
.rare{ color:deepskyblue; }
.epic{ color:violet; }
.legendary{ color:gold; }
.godly{
    color:red;
    text-shadow:0 0 20px red;
}

/* CUTSCENE */
.cutscene{
    position:fixed;
    inset:0;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    z-index:999;
}

.hidden{
    display:none;
}

.cutscene img{
    width:100%;
    height:100%;
    object-fit:cover;
}

</style>
</head>
<body>

<h1>RNG Roll</h1>

<button class="rollBtn" onclick="roll()">ROLL</button>
<button class="autoBtn" onclick="toggleAutoRoll()">AUTO ROLL</button>

<div id="result">?</div>

<!-- CUTSCENE -->
<div id="cutscene" class="cutscene hidden">
    <img id="cutsceneGif">
</div>

<script>

const items = [
    {
        name:"Ceyhun",
        chance:60,
        class:"common",
        gif:"https://media1.tenor.com/m/flyOCJGMcWcAAAAd/monarch-developer.gif"
    },
    {
        name:"Ferit",
        chance:25,
        class:"rare",
        gif:"https://media1.tenor.com/m/A1-dKFSCrs8AAAAC/sols-rng-malestorm.gif"
    },
    {
        name:"Pedo",
        chance:10,
        class:"epic",
        gif:"https://media1.tenor.com/m/v2_lxnj_Z3kAAAAd/oblivion-sols-rng-oblivion.gif"
    },
    {
        name:"Lezbiyenler",
        chance:4,
        class:"legendary",
        gif:"https://media1.tenor.com/m/v2_lxnj_Z3kAAAAd/oblivion-sols-rng-oblivion.gif"
    },
    {
        name:"Deria",
        chance:1,
        class:"godly",
        gif:"https://media1.tenor.com/m/VhNHLMSVUY8AAAAd/oppression-roblox.gif"
    }
];

let autoRolling = false;
let autoRollInterval;

function showCutscene(gif){

    const scene = document.getElementById("cutscene");
    const img = document.getElementById("cutsceneGif");

    img.src = gif;
    scene.classList.remove("hidden");

    setTimeout(() => {
        scene.classList.add("hidden");
        img.src = "";
    }, 2000);
}

function roll(){

    let random = Math.random() * 100;
    let total = 0;

    for(let item of items){

        total += item.chance;

        if(random <= total){

            const result = document.getElementById("result");

            result.innerHTML = item.name;
            result.className = item.class;

            showCutscene(item.gif);

            break;
        }
    }
}

function toggleAutoRoll(){

    autoRolling = !autoRolling;

    if(autoRolling){
        autoRollInterval = setInterval(roll, 1000);
    }else{
        clearInterval(autoRollInterval);
    }
}

</script>

</body>
</html>
