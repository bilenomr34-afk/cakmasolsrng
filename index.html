<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wordle Türkçe - 💜</title>
    <style>
        :root {
            --color-correct: #6aaa64;
            --color-present: #c9b458;
            --color-absent: #787c7e;
            --color-border: #d3d6da;
            --background-color: #fafafa;
            --color-text: #1a1a1a;
            --tile-bg: white;
            --key-bg: #e4e6eb;
            --key-active: #ccc;
            --border-radius: 4px;
        }

        [data-theme="dark"] {
            --background-color: #121213;
            --color-text: #f8f8f8;
            --color-border: #3a3a3c;
            --tile-bg: #121213;
            --key-bg: #818384;
            --key-active: #565758;
        }

        /* 💜 "DENİZ" yazıldığında aktif olacak Kalpli & Pofuduk Mor Tema 💜 */
        [data-theme="cute-purple"] {
            --background-color: #fbf7ff;
            --color-text: #5b21b6; /* Koyu mor yazı */
            --color-border: #e9d5ff; /* Açık mor çerçeveler */
            --tile-bg: #ffffff;
            --key-bg: #f3e8ff; /* Pofuduk mor tuşlar */
            --key-active: #d8b4fe;
            --color-correct: #a855f7; /* Canlı Mor */
            --color-present: #f472b6; /* Şirin Pembe */
            --color-absent: #cbd5e1;
            --border-radius: 16px; /* Kutuları pofuduk yuvarlak yapar */
        }

        /* Mor tema aktifken arka plana sevimli benekler ekleyelim */
        [data-theme="cute-purple"] body {
            background-image: radial-gradient(#f3e8ff 20%, transparent 20%), radial-gradient(#f5f3ff 20%, transparent 20%);
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: var(--background-color);
            color: var(--color-text);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        header {
            border-bottom: 1px solid var(--color-border);
            width: 100%;
            max-width: 500px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: 2px;
            margin: 10px 0;
        }

        .theme-btn {
            background: none;
            border: 1px solid var(--color-border);
            color: var(--color-text);
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        #game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            max-width: 500px;
            width: 100%;
        }

        #message-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            min-height: 75px;
        }

        #message {
            font-weight: bold;
            font-size: 1.2rem;
            color: #db2777; /* Tatlı pembe/kırmızı ton */
            text-align: center;
        }

        .action-btn {
            background-color: var(--color-correct);
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            display: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        #board {
            display: grid;
            grid-template-rows: repeat(6, 1fr);
            gap: 5px;
            padding: 10px;
            width: 330px;
            height: 400px;
        }

        .row {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 5px;
        }

        .tile {
            border: 2px solid var(--color-border);
            border-radius: var(--border-radius);
            display: inline-flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            font-weight: bold;
            text-transform: uppercase;
            user-select: none;
            transition: all 0.3s ease;
            background-color: var(--tile-bg);
            color: var(--color-text);
        }

        .tile[data-state="tiled"] {
            border-color: #878a8c;
        }

        [data-theme="cute-purple"] .tile[data-state="tiled"] {
            border-color: #c084fc; /* Mor modda yazılan harf çerçevesi */
        }

        .tile[data-state="correct"] {
            background-color: var(--color-correct);
            border-color: var(--color-correct);
            color: white;
        }

        .tile[data-state="present"] {
            background-color: var(--color-present);
            border-color: var(--color-present);
            color: white;
        }

        .tile[data-state="absent"] {
            background-color: var(--color-absent);
            border-color: var(--color-absent);
            color: white;
        }

        #keyboard {
            display: flex;
            flex-direction: column;
            gap: 8px;
            width: 100%;
            padding: 0 10px;
        }

        .keyboard-row {
            display: flex;
            justify-content: center;
            gap: 6px;
            touch-action: manipulation;
        }

        .key {
            background-color: var(--key-bg);
            color: var(--color-text);
            border: 0;
            border-radius: var(--border-radius);
            font-size: 1.1rem;
            font-weight: bold;
            height: 58px;
            cursor: pointer;
            user-select: none;
            display: flex;
            justify-content: center;
            align-items: center;
            flex: 1;
            transition: all 0.2s ease;
        }

        .key.wide {
            flex: 1.5;
            font-size: 0.9rem;
        }

        .key:active {
            background-color: var(--key-active);
        }

        .key[data-state="correct"] {
            background-color: var(--color-correct);
            color: white;
        }

        .key[data-state="present"] {
            background-color: var(--color-present);
            color: white;
        }

        .key[data-state="absent"] {
            background-color: var(--color-absent);
            color: white;
        }
    </style>
</head>
<body>

    <header>
        <h1 id="logo">WORDLE</h1>
        <button class="theme-btn" id="theme-toggle" onclick="toggleTheme()">🌙 Karanlık</button>
    </header>

    <div id="game-container">
        <div id="message-area">
            <div id="message">Yükleniyor...</div>
            <button class="action-btn" id="new-game-btn" onclick="startNewGame()">Yeni Oyun ↻</button>
        </div>
        <div id="board"></div>
        <div id="keyboard"></div>
    </div>

    <script>
        const ROW_COUNT = 6;
        const COL_COUNT = 5;
        
        let KELIMELER = [
            "DENİZ", "SABAH", "SABIR", "SABUN", "SAÇAK", "SALÇA", "DURUM", "DOLAR", 
            "KALEM", "KAPAK", "KAVUN", "ÇİÇEK", "KİTAP", "BEYAZ", "SEVDA", "MASAL"
        ]; 
        let secretWord = "";
        let currentRow = 0;
        let currentCol = 0;
        let gameOver = false;

        const board = document.getElementById("board");
        const keyboard = document.getElementById("keyboard");
        const message = document.getElementById("message");
        const newGameBtn = document.getElementById("new-game-btn");
        const logo = document.getElementById("logo");

        const KEYBOARD_LAYOUT = [
            ["E", "R", "T", "Y", "U", "I", "O", "P", "Ğ", "Ü"],
            ["A", "S", "D", "F", "G", "H", "J", "K", "L", "Ş", "İ"],
            ["ENTER", "Z", "X", "C", "V", "B", "N", "M", "Ö", "Ç", "SİL"]
        ];

        function turkceBuyukHarf(metin) {
            return metin
                .replace(/i/g, "İ")
                .replace(/ı/g, "I")
                .toUpperCase();
        }

        function cleanTextForCheck(text) {
            // Türkçe karakterleri tamamen standartlaştırarak kontrol hatalarını sıfırlıyoruz.
            return text
                .replace(/İ/g, "I")
                .replace(/ı/g, "I")
                .replace(/i/g, "I")
                .toUpperCase()
                .trim();
        }

        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute("data-theme");
            const toggleBtn = document.getElementById("theme-toggle");
            
            if (currentTheme === "cute-purple") {
                document.documentElement.setAttribute("data-theme", "dark");
                toggleBtn.textContent = "☀️ Aydınlık";
                logo.textContent = "WORDLE";
                return;
            }

            if (currentTheme === "dark") {
                document.documentElement.removeAttribute("data-theme");
                toggleBtn.textContent = "🌙 Karanlık";
                logo.textContent = "WORDLE";
            } else {
                document.documentElement.setAttribute("data-theme", "dark");
                toggleBtn.textContent = "☀️ Aydınlık";
                logo.textContent = "WORDLE";
            }
        }

        function initGame() {
            gameOver = false;
            currentRow = 0;
            currentCol = 0;
            newGameBtn.style.display = "none";
            message.textContent = "";

            if (document.documentElement.getAttribute("data-theme") === "cute-purple") {
                document.documentElement.removeAttribute("data-theme");
                document.getElementById("theme-toggle").textContent = "🌙 Karanlık";
                logo.textContent = "WORDLE";
            }

            secretWord = KELIMELER[Math.floor(Math.random() * KELIMELER.length)];
            console.log("Hile Gözcücü (Kelime):", secretWord); 

            // Matrisi Oluştur
            board.innerHTML = "";
            for (let r = 0; r < ROW_COUNT; r++) {
                const rowDiv = document.createElement("div");
                rowDiv.className = "row";
                for (let c = 0; c < COL_COUNT; c++) {
                    const tileSpan = document.createElement("span");
                    tileSpan.className = "tile";
                    tileSpan.id = `tile-${r}-${c}`;
                    rowDiv.appendChild(tileSpan);
                }
                board.appendChild(rowDiv);
            }

            // Klavyeyi Oluştur
            keyboard.innerHTML = "";
            KEYBOARD_LAYOUT.forEach(row => {
                const rowDiv = document.createElement("div");
                rowDiv.className = "keyboard-row";
                row.forEach(keyText => {
                    const button = document.createElement("button");
                    button.textContent = keyText;
                    button.className = "key";
                    button.id = `key-${keyText}`;
                    if (keyText === "ENTER" || keyText === "SİL") {
                        button.classList.add("wide");
                    }
                    button.addEventListener("click", () => handleInput(keyText));
                    rowDiv.appendChild(button);
                });
                keyboard.appendChild(rowDiv);
            });
        }

        function startNewGame() {
            initGame();
        }

        function handleInput(key) {
            if (gameOver) return;

            if (key === "SİL") {
                if (currentCol > 0) {
                    currentCol--;
                    const tile = document.getElementById(`tile-${currentRow}-${currentCol}`);
                    tile.textContent = "";
                    tile.removeAttribute("data-state");
                }
                message.textContent = "";
            } 
            else if (key === "ENTER") {
                if (currentCol === COL_COUNT) {
                    checkRow();
                } else {
                    showMessage("Kelimeyi tamamlayın! 🥺");
                }
            } 
            else if (/^[A-ZĞÜŞİÖÇIıi]$/i.test(key)) { 
                if (currentCol < COL_COUNT) {
                    const tile = document.getElementById(`tile-${currentRow}-${currentCol}`);
                    const upperKey = turkceBuyukHarf(key); 
                    tile.textContent = upperKey;
                    tile.setAttribute("data-state", "tiled");
                    currentCol++;
                }
            }
        }

        document.addEventListener("keydown", (e) => {
            let key = e.key;
            if (key === "Backspace") {
                handleInput("SİL");
            } else if (key === "Enter") {
                handleInput("ENTER");
            } else {
                handleInput(key);
            }
        });

        function checkRow() {
            let guess = "";
            for (let c = 0; c < COL_COUNT; c++) {
                guess += document.getElementById(`tile-${currentRow}-${c}`).textContent;
            }

            // --- 💜 ÖNCELİKLİ "DENİZ" SÜRPRİZ KONTROLÜ 💜 ---
            // Sözlük kontrolünden önce mor tema kontrolünü yaparak tüm takılmaları önlüyoruz.
            const cleanGuess = cleanTextForCheck(guess);
            if (cleanGuess === "DENIZ") {
                document.documentElement.setAttribute("data-theme", "cute-purple");
                document.getElementById("theme-toggle").textContent = "💜 Kalpli Mod";
                logo.textContent = "🎀 WORDLE 💜";
                showMessage("✨ Tatlış kalpli mod açıldı! ✨");
            } else {
                // Eğer yazılan kelime DENİZ değilse normal sözlük kontrolünü yapmaya devam et
                if (!KELIMELER.includes(guess)) {
                    showMessage("Sözlükte bulunamadı! 😿");
                    return;
                }
            }
            // --------------------------------------------------------

            let secretLetters = secretWord.split("");
            let rowStates = Array(COL_COUNT).fill("absent");

            for (let c = 0; c < COL_COUNT; c++) {
                if (guess[c] === secretWord[c]) {
                    rowStates[c] = "correct";
                    secretLetters[c] = null; 
                }
            }

            for (let c = 0; c < COL_COUNT; c++) {
                if (rowStates[c] === "correct") continue;

                let index = secretLetters.indexOf(guess[c]);
                if (index !== -1) {
                    rowStates[c] = "present";
                    secretLetters[index] = null;
                }
            }

            for (let c = 0; c < COL_COUNT; c++) {
                const tile = document.getElementById(`tile-${currentRow}-${c}`);
                const letter = guess[c];
                const state = rowStates[c];

                tile.setAttribute("data-state", state);
                updateKeyboard(letter, state);
            }

            if (guess === secretWord) {
                showMessage("Tebrikler! Kazandınız! 🎉💜✨");
                gameOver = true;
                newGameBtn.style.display = "block"; 
                return;
            }

            if (currentRow === ROW_COUNT - 1) {
                showMessage(`Olsun, bir dahakine! Kelime: ${secretWord} 🥺`);
                gameOver = true;
                newGameBtn.style.display = "block"; 
                return;
            }

            currentRow++;
            currentCol = 0;
        }

        function updateKeyboard(letter, state) {
            const keyBtn = document.getElementById(`key-${letter}`);
            if (!keyBtn) return;

            const currentState = keyBtn.getAttribute("data-state");
            if (currentState === "correct") return;
            if (currentState === "present" && state === "absent") return;

            keyBtn.setAttribute("data-state", state);
        }

        function showMessage(text) {
            message.textContent = text;
        }

        initGame();
    </script>
</body>
</html>
