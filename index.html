.row{

    height:58px;
    background:#818384;
    border:none;

    font-size:18px;
    font-weight:bold;

.gray{

#message{

#newGame{

<script>
function submitGuess(){

    if(col!=5){
        message.textContent="5 harf yaz!";
        return;
    }

    let guess="";

    for(let i=0;i<5;i++){

        guess+=tiles[row*5+i].textContent.toLowerCase();

    }

    if(!KELIMELER.includes(guess)){
        message.textContent="Bu kelime listede yok!";
        return;
    }

    message.textContent="";

    checkGuess(guess);

}
document.addEventListener("keydown", handleKey);

function handleKey(e){

    if(gameOver) return;

    let key=e.key.toUpperCase();

    if(key==="BACKSPACE"){

        deleteLetter();
        return;

    }

    if(key==="ENTER"){

        submitGuess();
        return;

    }

    if(key.length!==1) return;

    const letters="ABCÇDEFGĞHIİJKLMNOÖPRSŞTUÜVYZQWX";

    if(!letters.includes(key)) return;

    addLetter(key);

}

function addLetter(letter){

    if(col>=5) return;

    const index=row*5+col;

    tiles[index].textContent=letter;

    col++;

}

function deleteLetter(){

    if(col<=0) return;

    col--;

    const index=row*5+col;

    tiles[index].textContent="";

}

function submitGuess(){

    if(col<5){

        message.textContent="5 harf gir.";

        return;

    }

    let guess="";

    for(let i=0;i<5;i++){

        guess+=tiles[row*5+i].textContent.toLowerCase();

    }

    if(!KELIMELER.includes(guess)){

        message.textContent="Kelime bulunamadı.";

}
