<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Gacha RNG</title>

<style>
body{
    background:#111;
    color:white;
    font-family:Arial;
    text-align:center;
    margin-top:80px;
}

button{
    padding:15px 30px;
    font-size:22px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    margin:10px;
    color:white;
}

.rollBtn{ background:#6a00ff; }
.autoBtn{ background:#ff006a; }

#result{
    margin-top:30px;
    font-size:40px;
    font-weight:bold;
}

.common{ color:gray; }
.rare{ color:deepskyblue; }
.epic{ color:violet; }
.legendary{ color:gold; }
.godly{
    color:red;
    text-shadow:0 0 20px red;
}

/* CUTSCENE */
.cutscene{
    position:fixed;
    inset:0;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:999;
}

.hidden{
    display:none;
}

.cutscene img{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* INVENTORY */
#inventory{
    margin-top:20px;
    border-top:1px solid #333;
    padding-top:10px;
}
</style>
</head>
<body>

<h1>🔥 RNG GACHA</h1>

<button class="rollBtn" onclick="roll()">ROLL</button>
<button class="autoBtn" onclick="toggleAuto()">AUTO</button>

<div id="result">?</div>

<h2>🎒 Inventory</h2>
<div id="inventory"></div>

<!-- CUTSCENE -->
<div id="cutscene" class="cutscene hidden">
    <img id="cutsceneGif">
</div>

<script>

const items = [
    {
        name:"Cihan",
        chance:60,
        class:"common",
        gif:"https://media1.tenor.com/m/flyOCJGMcWcAAAAd/monarch-developer.gif"
    },
    {
        name:"Ferit",
        chance:25,
        class:"rare",
        gif:"https://media1.tenor.com/m/DM67oDEzHWgAAAAd/aegis-sols-rng.gif"
    },
    {
        name:"Pedo",
        chance:10,
        class:"epic",
        gif:"https://media1.tenor.com/m/v2_lxnj_Z3kAAAAd/oblivion-sols-rng-oblivion.gif"
    },
    {
        name:"Lezbiyenler",
        chance:4,
        class:"legendary",
        gif:"https://media1.tenor.com/m/A1-dKFSCrs8AAAAC/sols-rng-malestorm.gif"
    },
    {
        name:"Deria",
        chance:1,
        class:"godly",
        gif:"https://media1.tenor.com/m/iao77UYOTnkAAAAd/oppression-cutscene.gif"
    }
];

let inventory = [];
let auto = true;
let interval;
let isCutscenePlaying = true;

function updateInventory(){

    document.getElementById("inventory").innerHTML =
        inventory.map(i => `<div>${i}</div>`).join("");

}

function showCutscene(gif){

    isCutscenePlaying = false;

    const c = document.getElementById("cutscene");
    const img = document.getElementById("cutsceneGif");

    img.src = gif;
    c.classList.remove("hidden");

    setTimeout(() => {

        c.classList.add("hidden");
        img.src = "";
        isCutscenePlaying = false;

    }, 1800);
}

function roll(){



    let r = Math.random() * 100;
    let sum = 0;

    for(let item of items){

        sum += item.chance;

        if(r <= sum){

            const res = document.getElementById("result");

            res.innerHTML = item.name;
            res.className = item.class;

            inventory.push(item.name);

            updateInventory();

            showCutscene(item.gif);

            return;
        }
    }
}

function toggleAuto(){

    auto = !auto;

    if(auto){

        interval = setInterval(roll, 2000);

    }else{

        clearInterval(interval);

    }
}

</script>

</body>
</html>
