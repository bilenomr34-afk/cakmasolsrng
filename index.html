<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wordle Türkçe</title>
    <style>
        :root {
            --color-correct: #6aaa64;
            --color-present: #c9b458;
            --color-absent: #787c7e;
            --color-border: #d3d6da;
            --color-text: #1a1a1a;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #fafafa;
            color: var(--color-text);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }

        header {
            border-bottom: 1px solid var(--color-border);
            width: 100%;
            max-width: 500px;
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: 2px;
            margin: 10px 0;
        }

        #game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            max-width: 500px;
            width: 100%;
        }

        #board {
            display: grid;
            grid-template-rows: repeat(6, 1fr);
            gap: 5px;
            padding: 10px;
            width: 330px;
            height: 400px;
        }

        .row {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 5px;
        }

        .tile {
            border: 2px solid var(--color-border);
            border-radius: 4px;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            font-weight: bold;
            text-transform: uppercase;
            user-select: none;
            transition: all 0.2s ease;
            background-color: white;
        }

        .tile[data-state="tiled"] {
            border-color: #878a8c;
        }

        .tile[data-state="correct"] {
            background-color: var(--color-correct);
            border-color: var(--color-correct);
            color: white;
        }

        .tile[data-state="present"] {
            background-color: var(--color-present);
            border-color: var(--color-present);
            color: white;
        }

        .tile[data-state="absent"] {
            background-color: var(--color-absent);
            border-color: var(--color-absent);
            color: white;
        }

        #keyboard {
            display: flex;
            flex-direction: column;
            gap: 8px;
            width: 100%;
            padding: 0 10px;
        }

        .keyboard-row {
            display: flex;
            justify-content: center;
            gap: 6px;
            touch-action: manipulation;
        }

        .key {
            background-color: #e4e6eb;
            border: 0;
            border-radius: 4px;
            font-size: 1.2rem;
            font-weight: bold;
            height: 58px;
            cursor: pointer;
            user-select: none;
            display: flex;
            justify-content: center;
            align-items: center;
            flex: 1;
            transition: background-color 0.1s ease;
        }

        .key.wide {
            flex: 1.5;
            font-size: 0.9rem;
        }

        .key:active {
            background-color: #ccc;
        }

        .key[data-state="correct"] {
            background-color: var(--color-correct);
            color: white;
        }

        .key[data-state="present"] {
            background-color: var(--color-present);
            color: white;
        }

        .key[data-state="absent"] {
            background-color: var(--color-absent);
            color: white;
        }

        #message {
            height: 30px;
            font-weight: bold;
            font-size: 1.2rem;
            color: #e04040;
            text-align: center;
        }
    </style>
</head>
<body>

    <header>
        <h1>WORDLE</h1>
    </header>

    <div id="game-container">
        <div id="message">Yükleniyor...</div>
        <div id="board"></div>
        <div id="keyboard"></div>
    </div>

    <script>
        const ROW_COUNT = 6;
        const COL_COUNT = 5;
        
        let KELIMELER = []; 
        let secretWord = "";
        let currentRow = 0;
        let currentCol = 0;
        let gameOver = false;

        const board = document.getElementById("board");
        const keyboard = document.getElementById("keyboard");
        const message = document.getElementById("message");

        const KEYBOARD_LAYOUT = [
            ["E", "R", "T", "Y", "U", "I", "O", "P", "Ğ", "Ü"],
            ["A", "S", "D", "F", "G", "H", "J", "K", "L", "Ş", "İ"],
            ["ENTER", "Z", "X", "C", "V", "B", "N", "M", "Ö", "Ç", "SİL"]
        ];

        // Türkçe karakter güvenli büyük harf yapma fonksiyonu
        function turkceBuyukHarf(metin) {
            return metin
                .replace(/i/g, "İ")
                .replace(/ı/g, "I")
                .toUpperCase();
        }
    async function kelimeleriYukle() {
    // Statik ve her zaman en güncel sürümü çeken doğru link:
    const KELIME_LINKI = "https://gist.githubusercontent.com/bilenomr34-afk/6388bbc8e7def58d9cd286362a8cd273/raw/kelimeler.json";
    
    try {
        // Tarayıcının eski listeyi önbelleğe (cache) almaması için cache: "no-store" ekledik
        const response = await fetch(KELIME_LINKI, { cache: "no-store" });
        if (!response.ok) throw new Error("Dosya çekilemedi");
        
        KELIMELER = await response.json();
        message.textContent = ""; 
        initGame(); 
    } catch (error) {
        console.error("Yedek liste devreye giriyor:", error);
        KELIMELER = ["SABAH", "SABIR", "SABUN", "SAÇAK", "SALÇA", "DENİZ", "DURUM", "DOLAR"];
        message.textContent = "Yerel liste yüklendi.";
        setTimeout(() => message.textContent = "", 2000);
        initGame();
    }
}
        function initGame() {
            // Gist'ten gelen tüm kelimeleri Türkçe kuralıyla büyük harfe eşitliyoruz
            KELIMELER = KELIMELER.map(k => turkceBuyukHarf(k));

            secretWord = KELIMELER[Math.floor(Math.random() * KELIMELER.length)];
            console.log("Hile Gözcücü (Kelime):", secretWord); 

            board.innerHTML = "";
            for (let r = 0; r < ROW_COUNT; r++) {
                const rowDiv = document.createElement("div");
                rowDiv.className = "row";
                for (let c = 0; c < COL_COUNT; c++) {
                    const tileSpan = document.createElement("span");
                    tileSpan.className = "tile";
                    tileSpan.id = `tile-${r}-${c}`;
                    rowDiv.appendChild(tileSpan);
                }
                board.appendChild(rowDiv);
            }

            keyboard.innerHTML = "";
            KEYBOARD_LAYOUT.forEach(row => {
                const rowDiv = document.createElement("div");
                rowDiv.className = "keyboard-row";
                row.forEach(keyText => {
                    const button = document.createElement("button");
                    button.textContent = keyText;
                    button.className = "key";
                    button.id = `key-${keyText}`;
                    if (keyText === "ENTER" || keyText === "SİL") {
                        button.classList.add("wide");
                    }
                    button.addEventListener("click", () => handleInput(keyText));
                    rowDiv.appendChild(button);
                });
                keyboard.appendChild(rowDiv);
            });
        }

        function handleInput(key) {
            if (gameOver) return;

            if (key === "SİL") {
                if (currentCol > 0) {
                    currentCol--;
                    const tile = document.getElementById(`tile-${currentRow}-${currentCol}`);
                    tile.textContent = "";
                    tile.removeAttribute("data-state");
                }
                message.textContent = "";
            } 
            else if (key === "ENTER") {
                if (currentCol === COL_COUNT) {
                    checkRow();
                } else {
                    showMessage("Kelimeyi tamamlayın!");
                }
            } 
            else if (/^[A-ZĞÜŞİÖÇIıi]$/i.test(key)) { 
                if (currentCol < COL_COUNT) {
                    const tile = document.getElementById(`tile-${currentRow}-${currentCol}`);
                    const upperKey = turkceBuyukHarf(key); // Türkçe karakter güvenli büyütme
                    tile.textContent = upperKey;
                    tile.setAttribute("data-state", "tiled");
                    currentCol++;
                }
            }
        }

        document.addEventListener("keydown", (e) => {
            let key = e.key;
            if (key === "Backspace") {
                handleInput("SİL");
            } else if (key === "Enter") {
                handleInput("ENTER");
            } else {
                handleInput(key);
            }
        });

        function checkRow() {
            let guess = "";
            for (let c = 0; c < COL_COUNT; c++) {
                guess += document.getElementById(`tile-${currentRow}-${c}`).textContent;
            }

            // Gist listenizle karşılaştırma
            if (!KELIMELER.includes(guess)) {
                showMessage("Sözlükte bulunamadı!");
                return;
            }

            let secretLetters = secretWord.split("");
            let rowStates = Array(COL_COUNT).fill("absent");

            for (let c = 0; c < COL_COUNT; c++) {
                if (guess[c] === secretWord[c]) {
                    rowStates[c] = "correct";
                    secretLetters[c] = null; 
                }
            }

            for (let c = 0; c < COL_COUNT; c++) {
                if (rowStates[c] === "correct") continue;

                let index = secretLetters.indexOf(guess[c]);
                if (index !== -1) {
                    rowStates[c] = "present";
                    secretLetters[index] = null;
                }
            }

            for (let c = 0; c < COL_COUNT; c++) {
                const tile = document.getElementById(`tile-${currentRow}-${c}`);
                const letter = guess[c];
                const state = rowStates[c];

                tile.setAttribute("data-state", state);
                updateKeyboard(letter, state);
            }

            if (guess === secretWord) {
                showMessage("Tebrikler! Kazandınız! 🎉");
                gameOver = true;
                return;
            }

            if (currentRow === ROW_COUNT - 1) {
                showMessage(`Kaybettiniz! Kelime: ${secretWord}`);
                gameOver = true;
                return;
            }

            currentRow++;
            currentCol = 0;
        }

        function updateKeyboard(letter, state) {
            const keyBtn = document.getElementById(`key-${letter}`);
            if (!keyBtn) return;

            const currentState = keyBtn.getAttribute("data-state");
            if (currentState === "correct") return;
            if (currentState === "present" && state === "absent") return;

            keyBtn.setAttribute("data-state", state);
        }

        function showMessage(text) {
            message.textContent = text;
        }

        kelimeleriYukle();
    </script>
</body>
</html>
