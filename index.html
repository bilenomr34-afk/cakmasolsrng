<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Gacha RNG</title>

<style>
body{
    margin:0;
    background:#0b0b0f;
    color:white;
    font-family:Arial;
    text-align:center;
}

h1{
    margin-top:20px;
    text-shadow:0 0 15px #6a00ff;
}

.card{
    width:420px;
    margin:20px auto;
    padding:20px;
    background:rgba(255,255,255,0.05);
    border-radius:15px;
    border:1px solid rgba(255,255,255,0.1);
}

button{
    padding:12px 20px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    color:white;
    margin:5px;
}

.rollBtn{ background:#6a00ff; }
.autoBtn{ background:#ff006a; }

#result{
    font-size:32px;
    margin:15px 0;
}

.common{ color:#aaa; }
.rare{ color:#00c3ff; }
.epic{ color:#b84dff; }
.legendary{ color:#ffd700; }
.godly{ color:#ff0033; }
.samet{ color:#00ff99; }

#luckCounter{
    color:#00ff99;
    margin-bottom:10px;
}

#bar{
    width:100%;
    height:10px;
    background:#222;
    border-radius:10px;
    overflow:hidden;
}

#fill{
    width:0%;
    height:100%;
    background:white;
}

.cutscene{
    position:fixed;
    inset:0;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
}

.hidden{ display:none; }

.cutscene img{
    width:100%;
    height:100%;
    object-fit:contain;
}

input{
    padding:10px;
    border-radius:10px;
    border:none;
    width:60%;
}
</style>
</head>

<body>

<h1>🔥 RNG</h1>

<div class="card">

<button class="rollBtn" onclick="roll()">ROLL</button>
<button class="autoBtn" onclick="toggleAuto()">AUTO</button>

<div id="result">?</div>
<div id="luckCounter">🍀 0/10</div>

<div id="bar"><div id="fill"></div></div>

<br>

<input id="code" placeholder="Kod">
<button onclick="useCode()">OK</button>

<div id="inv"></div>

</div>

<div id="cut" class="cutscene hidden">
<img id="cutimg">
</div>

<script>

const items=[
{name:"Cihan",chance:60,class:"common",gif:"https://media1.tenor.com/m/flyOCJGMcWcAAAAd/monarch-developer.gif"},
{name:"Ferit",chance:25,class:"rare",gif:"https://media1.tenor.com/m/DM67oDEzHWgAAAAd/aegis-sols-rng.gif"},
{name:"Pedo",chance:10,class:"epic",gif:"https://media1.tenor.com/m/v2_lxnj_Z3kAAAAd/oblivion-sols-rng-oblivion.gif"},
{name:"Lezbi",chance:4,class:"legendary",gif:"https://media1.tenor.com/m/A1-dKFSCrs8AAAAC/sols-rng-malestorm.gif"},
{name:"Deria",chance:1,class:"godly",gif:"https://media1.tenor.com/m/iao77UYOTnkAAAAd/oppression-cutscene.gif"},
{name:"Samet",chance:0.0001,class:"samet",gif:"samet.png"}
];

let inv=[];
let auto=false;
let loop;
let luck=0;
let lock=false;

let deriaNext=false;
let sametNext=false;

function updateInv(){
document.getElementById("inv").innerHTML=inv.join("<br>");
}

function cut(img){
let c=document.getElementById("cut");
let i=document.getElementById("cutimg");
i.src=img;
c.classList.remove("hidden");
setTimeout(()=>{c.classList.add("hidden");i.src=""},1500);
}

function useCode(){
let c=document.getElementById("code").value.trim();

if(c==="MALEREN31") deriaNext=true;
else if(c==="İYİKİDOGDUNSAMET") sametNext=true;
else alert("wrong");

document.getElementById("code").value="";
}

function bar(cb){
if(lock) return;
lock=true;

let f=document.getElementById("fill");
let w=0;

let t=setInterval(()=>{
w+=6;
f.style.width=w+"%";

if(w>=100){
clearInterval(t);
f.style.width="0%";
lock=false;
cb();
}
},30);
}

function roll(){

if(lock) return;

luck++;
if(luck>10) luck=1;

document.getElementById("luckCounter").innerText="🍀 "+luck+"/10";

if(sametNext){
sametNext=false;
let s=items.find(i=>i.name==="Samet");
document.getElementById("result").innerText="SAMET";
inv.push("Samet");
updateInv();
cut(s.gif);
return;
}

if(deriaNext){
deriaNext=false;
let d=items.find(i=>i.name==="Deria");
document.getElementById("result").innerText="DERIA";
inv.push("Deria");
updateInv();
cut(d.gif);
return;
}

let multi=(luck===10)?2:1;

let pool=items.map(i=>({
...i,
chance:i.class!=="common"?i.chance*multi:i.chance
}));

let total=pool.reduce((a,b)=>a+b.chance,0);
let r=Math.random()*total;
let s=0;

for(let i of pool){
s+=i.chance;
if(r<=s){

document.getElementById("result").innerText=i.name;
document.getElementById("result").className=i.class;

inv.push(i.name);
updateInv();
cut(i.gif);

return;
}
}
}

function toggleAuto(){
auto=!auto;

if(auto){
loop=setInterval(()=>{
let c=document.getElementById("cut").classList.contains("hidden");
if(c) bar(()=>roll());
},600);
}else{
clearInterval(loop);
}
}

</script>

</body>
</html>
